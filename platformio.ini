; PlatformIO config — ESP32-S2-WROOM dev board (Saola-1 reference design).
;
; If you're on a different S2 dev board, swap the `board` line for one of:
;   lolin_s2_mini, lolin_s2_pico, featheresp32-s2
; (run `pio boards esp32s2` to list options).
;
; Upload + monitor:
;   pio run -t upload
;   pio device monitor

[env:esp32-s2-saola-1]
platform      = espressif32
board         = esp32-s2-saola-1
framework     = arduino
monitor_speed = 115200

; Route Serial to native USB CDC. This makes the chip appear as /dev/cu.usbmodem*
; after boot, which lets esptool reset it without the BOOT+RESET dance.
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1

; ESP32-S2 native-USB CDC needs a USB control reset instead of DTR/RTS toggling.
upload_flags = --before=usb_reset

; Pinned so PlatformIO doesn't auto-pick /dev/cu.Bluetooth-Incoming-Port:
upload_port  = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*
